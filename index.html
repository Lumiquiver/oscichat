<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oscillation Group Chat</title>
  
  <!-- Cool Sci-Fi / Tech Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #03060a;
      --panel-bg: rgba(10, 15, 25, 0.85);
      --neon-green: #00ff9d;
      --neon-cyan: #00e5ff;
      --alert-red: #ff0055;
      --text-main: #e2e8f0;
      --text-muted: #4b637a;
      --grid-color: rgba(0, 255, 157, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Space Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
    }

    /* 5-SECOND LOADER ANIMATION */
    #loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #010306;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .oscillation-wave {
      display: flex;
      gap: 8px;
      align-items: center;
      height: 60px;
      margin-bottom: 20px;
    }

    .wave-bar {
      width: 10px;
      height: 10px;
      background-color: var(--neon-green);
      border-radius: 5px;
      box-shadow: 0 0 15px var(--neon-green);
      animation: oscillate 1.2s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0.0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { animation-delay: 0.3s; }
    .wave-bar:nth-child(7) { animation-delay: 0.2s; }
    .wave-bar:nth-child(8) { animation-delay: 0.1s; }
    .wave-bar:nth-child(9) { animation-delay: 0.0s; }

    @keyframes oscillate {
      0%, 100% { height: 10px; transform: scaleY(1); background-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
      50% { height: 60px; transform: scaleY(1); background-color: var(--neon-green); box-shadow: 0 0 25px var(--neon-green); }
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      color: var(--neon-green);
      letter-spacing: 4px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* MAIN APP UI */
    #app-container {
      width: 100%;
      max-width: 1000px;
      height: 90vh;
      background: var(--panel-bg);
      border: 1px solid rgba(0, 255, 157, 0.2);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 255, 157, 0.05), inset 0 0 20px rgba(0, 255, 157, 0.02);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      opacity: 0; 
      transform: scale(0.95);
      transition: opacity 0.8s ease, transform 0.8s ease;
      overflow: hidden;
      position: relative;
    }

    #app-container.visible {
      opacity: 1;
      transform: scale(1);
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(0, 255, 157, 0.2);
      background: linear-gradient(180deg, rgba(0, 255, 157, 0.05) 0%, transparent 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: var(--neon-green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-green);
    }

    .status {
      font-size: 0.8rem;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* Chat Area */
    #chat {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(0, 255, 157, 0.3); border-radius: 10px; }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--neon-green); }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: slideIn 0.3s ease-out forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-other { align-self: flex-start; }
    .msg-mine { align-self: flex-end; }

    .msg-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 5px;
      font-family: 'Orbitron', sans-serif;
    }

    .msg-mine .msg-header { flex-direction: row-reverse; }

    .msg-user { font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
    .msg-other .msg-user { color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0, 229, 255, 0.5); }
    .msg-mine .msg-user { color: var(--neon-green); text-shadow: 0 0 5px rgba(0, 255, 157, 0.5); }

    .msg-time { font-size: 0.7rem; color: var(--text-muted); }

    .msg-bubble {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }

    .msg-other .msg-bubble {
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-left: 3px solid var(--neon-cyan);
      border-bottom-left-radius: 0;
    }

    .msg-mine .msg-bubble {
      background: rgba(0, 255, 157, 0.05);
      border: 1px solid rgba(0, 255, 157, 0.2);
      border-right: 3px solid var(--neon-green);
      border-bottom-right-radius: 0;
      color: #fff;
    }

    #controls {
      padding: 20px;
      background: rgba(5, 8, 15, 0.9);
      border-top: 1px solid rgba(0, 255, 157, 0.2);
      display: flex;
      gap: 15px;
      position: relative;
    }

    input {
      background: rgba(0, 0, 0, 0.5);
      color: var(--text-main);
      border: 1px solid var(--text-muted);
      padding: 15px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.15);
      background: rgba(0, 255, 157, 0.02);
    }

    #user {
      width: 180px;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--neon-green);
    }

    #message { flex: 1; }

    button {
      background: transparent;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      padding: 0 30px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 20px var(--neon-green);
    }

    button:active { transform: scale(0.95); }

    @media (max-width: 768px) {
      #app-container { height: 100vh; border-radius: 0; border: none; }
      #controls { flex-wrap: wrap; }
      #user { width: 100%; }
      #message { width: 100%; order: 2; }
      button { width: 100%; order: 3; padding: 15px; }
    }
  </style>
</head>
<body>

  <!-- 5 SECOND LOADER -->
  <div id="loader">
    <div class="oscillation-wave">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div class="loader-text">ESTABLISHING SECURE CONNECTION...</div>
  </div>

  <!-- MAIN APP -->
  <div id="app-container">
    <header>
      <h1>Oscillation</h1>
      <div class="status">SECURE</div>
    </header>

    <div id="chat"></div>

    <div id="controls">
      <input id="user" placeholder="Callsign" autocomplete="off" oninput="saveUsername()" />
      <input id="message" placeholder="Transmit message..." autocomplete="off" onkeypress="handleKeyPress(event)" />
      <button onclick="sendMessage()">TX</button>
    </div>
  </div>

  <script>
    const COMPANY_KEY = 'oscillation-secret'; // same as backend key
    let renderedMessageCount = 0; // NEW: Keeps track of rendered messages

    document.addEventListener("DOMContentLoaded", () => {
      const savedUser = localStorage.getItem('oscillation_username');
      if (savedUser) {
        document.getElementById('user').value = savedUser;
      }

      fetchMessages();
      setInterval(fetchMessages, 1500);

      setTimeout(() => {
        const loader = document.getElementById('loader');
        const app = document.getElementById('app-container');
        
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
          app.classList.add('visible');
          
          const chat = document.getElementById('chat');
          chat.scrollTop = chat.scrollHeight;
        }, 500);
      }, 5000); 
    });

    function saveUsername() {
      const user = document.getElementById('user').value.trim();
      if (user) localStorage.setItem('oscillation_username', user);
    }

    async function fetchMessages() {
      try {
        const res = await fetch('https://YOUR-RENDER-APP.onrender.com/messages');
        const messages = await res.json();
        
        const chat = document.getElementById('chat');
        const currentUser = document.getElementById('user').value.trim() || 'Anon';
        
        // Check if user is actively looking at older messages (not scrolled to bottom)
        // We give a 60px buffer to account for minor scrolling margins
        const isScrolledToBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 60;

        // If the server was wiped/reset, clear the chat
        if (messages.length < renderedMessageCount) {
          chat.innerHTML = '';
          renderedMessageCount = 0;
        }

        // ONLY add messages that are actually NEW (This prevents the jumping issue!)
        if (messages.length > renderedMessageCount) {
          const newMessages = messages.slice(renderedMessageCount);
          
          newMessages.forEach(([time, user, msg]) => {
            const wrapper = document.createElement('div');
            const isMine = (user === currentUser);
            wrapper.className = `msg-wrapper ${isMine ? 'msg-mine' : 'msg-other'}`;
            
            const t = new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            wrapper.innerHTML = `
              <div class="msg-header">
                <span class="msg-user">${user}</span>
                <span class="msg-time">[${t}]</span>
              </div>
              <div class="msg-bubble">${msg}</div>
            `;
            
            chat.appendChild(wrapper);
          });

          // Check if it's the very first load
          const isInitialLoad = renderedMessageCount === 0;
          
          // Update the counter to the new total
          renderedMessageCount = messages.length;

          // Auto-scroll to bottom ONLY if they were already at the bottom OR if it's the first time loading
          if (isScrolledToBottom || isInitialLoad) {
            // Slight delay to allow DOM to calculate new heights
            setTimeout(() => {
              chat.scrollTop = chat.scrollHeight;
            }, 10);
          }
        }
      } catch (err) {
        console.error("Transmission error: ", err);
      }
    }

    async function sendMessage() {
      const userEl = document.getElementById('user');
      const messageEl = document.getElementById('message');
      
      const user = userEl.value.trim() || 'Anon';
      const message = messageEl.value.trim();
      
      if (!message) return;

      saveUsername();
      
      // Temporarily disable input to prevent double-sends
      messageEl.disabled = true;
      
      try {
        await fetch('https://YOUR-RENDER-APP.onrender.com/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, message, key: COMPANY_KEY })
        });
        
        messageEl.value = '';
        messageEl.disabled = false;
        messageEl.focus();
        
        // Fetch new messages immediately
        await fetchMessages();
        
        // Force scroll to bottom because you just sent a message
        const chat = document.getElementById('chat');
        chat.scrollTop = chat.scrollHeight;
        
      } catch (err) {
        console.error("Failed to transmit: ", err);
        messageEl.disabled = false;
      }
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
  </script>
</body>
</html>
